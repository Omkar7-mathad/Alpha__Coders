<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Engineering Awareness</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* BODY */

body{
font-family:Segoe UI;
margin:0;
background:
linear-gradient(rgba(15,23,42,0.88), rgba(15,23,42,0.88)),
url("https://images.unsplash.com/photo-1518770660439-4636190af475");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
}

/* HEADER */

header{
background:rgba(30,58,138,0.85);
backdrop-filter:blur(6px);
color:white;
text-align:center;
padding:20px;
font-size:30px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

/* CONTAINER */

.container{
width:90%;
max-width:1100px;
margin:auto;
padding:40px 0;
}

/* COURSE GRID */

.course-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

/* COURSE CARDS */

.course-card{
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:12px;
text-align:center;
font-size:18px;
font-weight:bold;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.2);
transition:0.3s;
}

.course-card i{
display:block;
font-size:30px;
margin-bottom:12px;
color:#60a5fa;
}

.course-card:hover{
transform:translateY(-6px);
background:#2563eb;
color:white;
}

.course-card:hover i{
color:white;
}

/* BUTTONS */

.btn-group{
margin-top:30px;
text-align:center;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button i{
margin-right:6px;
}

button:hover{
background:#1e40af;
transform:scale(1.05);
}

/* RESULT BOX */

.result-box{
margin-top:30px;
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:12px;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.2);
display:none;
}

.result-box h3{
margin-bottom:10px;
color:#93c5fd;
}

/* INFO BOX */

.info-box{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.2);
margin-top:30px;
text-align:center;
font-size:17px;
backdrop-filter:blur(8px);
}

/* BACK BUTTON */

.back-btn{
background:#64748b;
}

.back-btn:hover{
background:#475569;
}

</style>
</head>

<body>

<header>
<i class="fa-solid fa-graduation-cap"></i> Engineering Career Awareness
</header>

<div class="container">

<div style="margin-bottom:20px;">
<a href="course.html">
<button class="back-btn">
<i class="fa-solid fa-arrow-left"></i> Back
</button>
</a>
</div>

<h2>Popular Engineering Courses</h2>

<div class="course-grid">

<div class="course-card">
<i class="fa-solid fa-laptop-code"></i>
Computer Science Engineering
</div>

<div class="course-card">
<i class="fa-solid fa-gears"></i>
Mechanical Engineering
</div>

<div class="course-card">
<i class="fa-solid fa-building"></i>
Civil Engineering
</div>

<div class="course-card">
<i class="fa-solid fa-bolt"></i>
Electrical Engineering
</div>

<div class="course-card">
<i class="fa-solid fa-robot"></i>
Artificial Intelligence & ML
</div>

</div>

<h2 style="margin-top:50px">Choose Your Stream</h2>

<div class="btn-group">
<button onclick="setStream('pcmc')"><i class="fa-solid fa-calculator"></i> PCMC</button>
<button onclick="setStream('pcmb')"><i class="fa-solid fa-dna"></i> PCMB</button>
</div>

<div class="info-box" id="info">
<i class="fa-solid fa-circle-info"></i>
Select your stream to explore entrance exams and available courses.
</div>

<h2 style="margin-top:30px; display:none;" id="examTitle">Entrance Exams</h2>

<div class="btn-group" id="examButtons" style="display:none;">
<button onclick="showCourses('jee')"><i class="fa-solid fa-book"></i> JEE</button>
<button onclick="showCourses('kcet')"><i class="fa-solid fa-school"></i> KCET</button>
<button onclick="showCourses('comedk')"><i class="fa-solid fa-university"></i> COMEDK</button>
<button onclick="showCourses('viteee')"><i class="fa-solid fa-flask"></i> VITEEE</button>
</div>

<div id="result" class="result-box"></div>

</div>

<script>

let stream="";

function setStream(s){
stream=s;

document.getElementById("examButtons").style.display="block";
document.getElementById("examTitle").style.display="block";

document.getElementById("info").innerHTML =
"<i class='fa-solid fa-check'></i> You selected <b>"+s.toUpperCase()+"</b>. Now choose an entrance exam.";
}

function showCourses(exam){

let result=document.getElementById("result");
let courses="";

/* JEE */

if(exam=="jee"){

courses=`
<h3><i class="fa-solid fa-book"></i> Courses available through JEE</h3>

<div class="course-grid">
<div class="course-card"><i class="fa-solid fa-laptop-code"></i>CSE</div>
<div class="course-card"><i class="fa-solid fa-gears"></i>Mechanical</div>
<div class="course-card"><i class="fa-solid fa-building"></i>Civil</div>
<div class="course-card"><i class="fa-solid fa-bolt"></i>Electrical</div>
<div class="course-card"><i class="fa-solid fa-robot"></i>AI & ML</div>
</div>
`;

}

/* KCET */

if(exam=="kcet"){

if(stream=="pcmc"){

courses=`
<h3><i class="fa-solid fa-school"></i> KCET Courses for PCMC</h3>

<div class="course-grid">
<div class="course-card"><i class="fa-solid fa-laptop-code"></i>CSE</div>
<div class="course-card"><i class="fa-solid fa-gears"></i>Mechanical</div>
<div class="course-card"><i class="fa-solid fa-building"></i>Civil</div>
<div class="course-card"><i class="fa-solid fa-bolt"></i>Electrical</div>
<div class="course-card"><i class="fa-solid fa-microchip"></i>Electronics</div>
</div>
`;

}

if(stream=="pcmb"){

courses=`
<h3><i class="fa-solid fa-school"></i> KCET Courses for PCMB</h3>

<div class="course-grid">
<div class="course-card"><i class="fa-solid fa-gear"></i>B.E / B.Tech</div>
<div class="course-card"><i class="fa-solid fa-capsules"></i>B.Pharm</div>
<div class="course-card"><i class="fa-solid fa-pills"></i>Pharma-D</div>
<div class="course-card"><i class="fa-solid fa-leaf"></i>Agriculture</div>
<div class="course-card"><i class="fa-solid fa-cow"></i>Veterinary</div>
<div class="course-card"><i class="fa-solid fa-glass-water"></i>Dairy Tech</div>
<div class="course-card"><i class="fa-solid fa-tree"></i>Forestry</div>
<div class="course-card"><i class="fa-solid fa-spa"></i>Ayurveda (BAMS)</div>
<div class="course-card"><i class="fa-solid fa-hand-holding-heart"></i>Yoga & Naturopathy</div>
</div>
`;

}

}

/* COMEDK */

if(exam=="comedk"){

courses=`
<h3><i class="fa-solid fa-university"></i> Courses through COMEDK</h3>

<div class="course-grid">
<div class="course-card"><i class="fa-solid fa-laptop-code"></i>CSE</div>
<div class="course-card"><i class="fa-solid fa-gears"></i>Mechanical</div>
<div class="course-card"><i class="fa-solid fa-building"></i>Civil</div>
<div class="course-card"><i class="fa-solid fa-bolt"></i>Electrical</div>
<div class="course-card"><i class="fa-solid fa-microchip"></i>Electronics</div>
<div class="course-card"><i class="fa-solid fa-robot"></i>AI & ML</div>
</div>
`;

}

/* VITEEE */

if(exam=="viteee"){

courses=`
<h3><i class="fa-solid fa-flask"></i> Courses through VITEEE</h3>

<div class="course-grid">
<div class="course-card"><i class="fa-solid fa-laptop-code"></i>CSE</div>
<div class="course-card"><i class="fa-solid fa-robot"></i>Artificial Intelligence</div>
<div class="course-card"><i class="fa-solid fa-gears"></i>Mechanical</div>
<div class="course-card"><i class="fa-solid fa-bolt"></i>Electrical</div>
<div class="course-card"><i class="fa-solid fa-building"></i>Civil</div>
<div class="course-card"><i class="fa-solid fa-microchip"></i>Electronics</div>
</div>
`;

}

result.style.display="block";
result.innerHTML=courses;

}

</script>

</body>
</html>
