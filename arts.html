
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arts Career Awareness</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* BODY */

body{
font-family:Segoe UI;
margin:0;

background:
linear-gradient(rgba(15,23,42,0.88), rgba(15,23,42,0.88)),
url("https://images.unsplash.com/photo-1513364776144-60967b0f800f");

background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
}

/* HEADER */

header{
background:rgba(220,38,38,0.85);
backdrop-filter:blur(6px);
color:white;
text-align:center;
padding:20px;
font-size:30px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

/* CONTAINER */

.container{
width:90%;
max-width:1100px;
margin:auto;
padding:40px 0;
}

/* COURSE GRID */

.course-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

/* COURSE CARDS */

.course-card{
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:12px;
text-align:center;
font-size:18px;
font-weight:bold;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.2);
transition:0.3s;
}

.course-card i{
display:block;
font-size:30px;
margin-bottom:12px;
color:#fca5a5;
}

.course-card:hover{
transform:translateY(-6px);
background:#dc2626;
color:white;
}

.course-card:hover i{
color:white;
}

/* BUTTONS */

.btn-group{
margin-top:30px;
text-align:center;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
background:#dc2626;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button i{
margin-right:6px;
}

button:hover{
background:#b91c1c;
transform:scale(1.05);
}

/* RESULT BOX */

.result-box{
margin-top:30px;
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:12px;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.2);
display:none;
}

.result-box h3{
margin-bottom:10px;
color:#fca5a5;
}

/* INFO BOX */

.info-box{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.2);
margin-top:30px;
text-align:center;
font-size:17px;
backdrop-filter:blur(8px);
}

/* BACK BUTTON */

.back-btn{
background:#64748b;
}

.back-btn:hover{
background:#475569;
}

</style>
</head>

<body>

<header>
<i class="fa-solid fa-book-open"></i> Arts Career Awareness
</header>

<div class="container">

<div style="margin-bottom:20px;">
<a href="course.html">
<button class="back-btn">
<i class="fa-solid fa-arrow-left"></i> Back
</button>
</a>
</div>

<h2>Popular Arts Courses</h2>

<div class="course-grid">

<div class="course-card">
<i class="fa-solid fa-landmark"></i>
BA Political Science
</div>

<div class="course-card">
<i class="fa-solid fa-globe"></i>
BA Geography
</div>

<div class="course-card">
<i class="fa-solid fa-users"></i>
BA Sociology
</div>

<div class="course-card">
<i class="fa-solid fa-brain"></i>
BA Psychology
</div>

<div class="course-card">
<i class="fa-solid fa-scale-balanced"></i>
BA LLB (Law)
</div>

</div>

<h2 style="margin-top:50px">Choose Your Stream</h2>

<div class="btn-group">
<button onclick="setStream('arts')">
<i class="fa-solid fa-book"></i> Arts / Humanities
</button>
</div>

<div class="info-box" id="info">
<i class="fa-solid fa-circle-info"></i>
Select your stream to explore courses and career paths in Arts.
</div>

<h2 style="margin-top:30px; display:none;" id="examTitle">
Career Options
</h2>

<div class="btn-group" id="examButtons" style="display:none;">

<button onclick="showCourses('degree')">
<i class="fa-solid fa-university"></i> Degree Courses
</button>

<button onclick="showCourses('professional')">
<i class="fa-solid fa-briefcase"></i> Professional Careers
</button>

</div>

<div id="result" class="result-box"></div>

</div>

<script>

let stream = "";

function setStream(s){

stream = s;

document.getElementById("examButtons").style.display = "block";
document.getElementById("examTitle").style.display = "block";

document.getElementById("info").innerHTML =
"<i class='fa-solid fa-check'></i> You selected <b>Arts</b>. Now explore available courses.";

}

function showCourses(type){

let result = document.getElementById("result");
let courses = "";

/* DEGREE COURSES */

if(type === "degree"){

courses = `
<h3><i class="fa-solid fa-university"></i> Arts Degree Courses</h3>

<div class="course-grid">

<div class="course-card"><i class="fa-solid fa-landmark"></i>BA Political Science</div>
<div class="course-card"><i class="fa-solid fa-brain"></i>BA Psychology</div>
<div class="course-card"><i class="fa-solid fa-users"></i>BA Sociology</div>
<div class="course-card"><i class="fa-solid fa-globe"></i>BA Geography</div>
<div class="course-card"><i class="fa-solid fa-language"></i>BA English</div>

</div>
`;

}

/* PROFESSIONAL CAREERS */

if(type === "professional"){

courses = `
<h3><i class="fa-solid fa-briefcase"></i> Arts Professional Careers</h3>

<div class="course-grid">

<div class="course-card"><i class="fa-solid fa-scale-balanced"></i>Law (LLB)</div>
<div class="course-card"><i class="fa-solid fa-pen-nib"></i>Journalism</div>
<div class="course-card"><i class="fa-solid fa-chalkboard-user"></i>Teaching</div>
<div class="course-card"><i class="fa-solid fa-bullhorn"></i>Public Relations</div>
<div class="course-card"><i class="fa-solid fa-film"></i>Media & Communication</div>

</div>
`;

}

result.style.display = "block";
result.innerHTML = courses;

}

</script>

</body>
</html>
