<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Medical Career Awareness</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* BODY */

body{
font-family:Segoe UI, sans-serif;
margin:0;

background:
linear-gradient(rgba(15,23,42,0.85), rgba(15,23,42,0.85)),
url("https://images.unsplash.com/photo-1581594693702-fbdc51b2763b?auto=format&fit=crop&w=1600&q=80");

background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
}

/* HEADER */

header{
background:rgba(15,118,110,0.85);
backdrop-filter:blur(6px);
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

/* CONTAINER */

.container{
width:90%;
max-width:1100px;
margin:auto;
padding:40px 0;
}

/* GRID */

.course-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

/* CARDS */

.course-card{
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:12px;
text-align:center;
font-size:18px;
font-weight:bold;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.2);
transition:0.3s;
cursor:pointer;
}

.course-card i{
display:block;
font-size:30px;
margin-bottom:12px;
color:#5eead4;
}

.course-card:hover{
transform:translateY(-6px);
background:#0f766e;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.course-card:hover i{
color:white;
}

/* BUTTONS */

.btn-group{
margin-top:30px;
text-align:center;
}

button{
padding:12px 22px;
margin:10px;
border:none;
border-radius:8px;
background:#0f766e;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button i{
margin-right:6px;
}

button:hover{
background:#115e59;
transform:scale(1.05);
}

/* RESULT BOX */

.result-box{
margin-top:30px;
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:12px;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.2);
display:none;
}

.result-box h3{
margin-bottom:10px;
color:#5eead4;
}

/* INFO BOX */

.info-box{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.2);
margin-top:30px;
text-align:center;
font-size:17px;
backdrop-filter:blur(8px);
}

/* BACK BUTTON */

.back-btn{
background:#64748b;
}

.back-btn:hover{
background:#475569;
}

</style>
</head>

<body>

<header>
<i class="fa-solid fa-stethoscope"></i> Medical Career Awareness
</header>

<div class="container">

<div style="margin-bottom:20px;">
<a href="course.html">
<button class="back-btn">
<i class="fa-solid fa-arrow-left"></i> Back
</button>
</a>
</div>

<h2>Popular Medical Courses</h2>

<div class="course-grid">

<div class="course-card">
<i class="fa-solid fa-user-doctor"></i>
MBBS
</div>

<div class="course-card">
<i class="fa-solid fa-tooth"></i>
BDS
</div>

<div class="course-card">
<i class="fa-solid fa-leaf"></i>
BAMS
</div>

<div class="course-card">
<i class="fa-solid fa-heart-pulse"></i>
BHMS
</div>

<div class="course-card">
<i class="fa-solid fa-user-nurse"></i>
B.Sc Nursing
</div>

</div>

<h2 style="margin-top:50px">Choose Your Stream</h2>

<div class="btn-group">
<button onclick="setStream('pcmb')">
<i class="fa-solid fa-dna"></i> PCMB
</button>
</div>

<div class="info-box" id="info">
<i class="fa-solid fa-circle-info"></i>
Medical courses require Biology (PCMB). Select the stream to see entrance exams.
</div>

<h2 style="margin-top:30px; display:none;" id="examTitle">Entrance Exams</h2>

<div class="btn-group" id="examButtons" style="display:none;">
<button onclick="showCourses('neet')">
<i class="fa-solid fa-book"></i> NEET
</button>

<button onclick="showCourses('kcet')">
<i class="fa-solid fa-school"></i> KCET
</button>
</div>

<div id="result" class="result-box"></div>

</div>

<script>

function setStream(stream){

document.getElementById("examButtons").style.display="block";
document.getElementById("examTitle").style.display="block";

document.getElementById("info").innerHTML =
"<i class='fa-solid fa-check'></i> You selected <b>"+stream.toUpperCase()+"</b>. Now choose the entrance exam.";

}

function showCourses(exam){

const result=document.getElementById("result");
let courses="";

if(exam==="neet"){

courses=`
<h3><i class="fa-solid fa-book"></i> Courses available through NEET</h3>

<div class="course-grid">
<div class="course-card"><i class="fa-solid fa-user-doctor"></i> MBBS</div>
<div class="course-card"><i class="fa-solid fa-tooth"></i> BDS</div>
<div class="course-card"><i class="fa-solid fa-leaf"></i> BAMS</div>
<div class="course-card"><i class="fa-solid fa-heart-pulse"></i> BHMS</div>
<div class="course-card"><i class="fa-solid fa-user-nurse"></i> B.Sc Nursing</div>
</div>
`;

}

if(exam==="kcet"){

courses=`
<h3><i class="fa-solid fa-school"></i> Courses available through KCET</h3>

<div class="course-grid">
<div class="course-card"><i class="fa-solid fa-user-nurse"></i> B.Sc Nursing</div>
<div class="course-card"><i class="fa-solid fa-cow"></i> Veterinary Science</div>
<div class="course-card"><i class="fa-solid fa-leaf"></i> Agriculture</div>
<div class="course-card"><i class="fa-solid fa-glass-water"></i> Dairy Technology</div>
<div class="course-card"><i class="fa-solid fa-tree"></i> Forestry</div>
<div class="course-card"><i class="fa-solid fa-pills"></i> B.Pharm</div>
<div class="course-card"><i class="fa-solid fa-capsules"></i> Pharma-D</div>
<div class="course-card"><i class="fa-solid fa-leaf"></i> BNYS</div>
</div>
`;

}

result.style.display="block";
result.innerHTML=courses;

}

</script>

</body>
</html>
