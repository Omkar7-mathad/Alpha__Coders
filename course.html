<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Stream Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family: 'Poppins', sans-serif;
margin:0;

/* Background Image */
background:linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f");

background-size:cover;
background-position:center;
height:100vh;
color:white;
}

/* Center Container */
.container{
margin-top:120px;
}

/* Glass Cards */
.stream-card{
cursor:pointer;
transition:0.4s;
border-radius:15px;
backdrop-filter:blur(10px);
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.2);
color:white;
}

.stream-card:hover{
transform:translateY(-8px);
background:rgba(255,255,255,0.2);
}

/* Remove link underline */
a{
text-decoration:none;
color:white;
}

/* Back Button */
.btn-secondary{
background:rgba(255,255,255,0.2);
border:none;
}

.btn-secondary:hover{
background:rgba(255,255,255,0.35);
}

h2{
font-weight:600;
}

</style>

</head>

<body>

<div class="container">

<!-- Back Button -->
<button class="btn btn-secondary mb-4" onclick="window.location.href='index.html'">
<i class="fa-solid fa-arrow-left"></i> Back
</button>

<h2 class="text-center mb-5">Select Your Stream</h2>

<div class="row text-center g-4">

<!-- Engineering -->
<div class="col-md-3">
<a href="engineering.html">
<div class="card p-4 stream-card">
<i class="fa-solid fa-gears fa-3x text-primary"></i>
<h5 class="mt-3">Engineering</h5>
</div>
</a>
</div>

<!-- Medical -->
<div class="col-md-3">
<a href="medical.html">
<div class="card p-4 stream-card">
<i class="fa-solid fa-user-doctor fa-3x text-danger"></i>
<h5 class="mt-3">Medical</h5>
</div>
</a>
</div>

<!-- Commerce -->
<div class="col-md-3">
<a href="commerce.html">
<div class="card p-4 stream-card">
<i class="fa-solid fa-chart-line fa-3x text-success"></i>
<h5 class="mt-3">Commerce</h5>
</div>
</a>
</div>

<!-- Arts -->
<div class="col-md-3">
<a href="arts.html">
<div class="card p-4 stream-card">
<i class="fa-solid fa-palette fa-3x text-warning"></i>
<h5 class="mt-3">Arts</h5>
</div>
</a>
</div>

</div>

</div>

</body>
</html>
